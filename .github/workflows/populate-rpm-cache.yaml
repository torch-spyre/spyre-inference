name: populate-rpm-cache

on:
  # Runs with base-repo secrets so it can reach Artifactory.
  # Checks out the PR head to get its version of the lock file,
  # so the cache key matches what the pull_request test job will look for.
  pull_request_target:
    paths:
      - spyre-rpms.lock
  # Pre-populate on every push to main so PRs that don't touch the lock
  # file get a cache hit on their first run.
  push:
    branches: [main]
    paths:
      - spyre-rpms.lock
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  populate:
    name: Download and cache Spyre RPMs
    # Needs curl and Artifactory network access; no Spyre hardware required.
    runs-on:
      - x86_64
      - spyre_pf_x0__pvc_1tb_x1
      - linux
      - image_torch_spyre_pinned_shadow

    steps:
      # Always check out the base branch so the download script comes from
      # trusted code. pull_request_target's default ref is already the base.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # For PRs: overwrite the lock file with the PR head's version so the
      # cache key matches what the pull_request test job will compute.
      # Fetching a single data file via API is safe — no code is executed.
      - name: Fetch lock file from PR head
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/spyre-rpms.lock?ref=${{ github.event.pull_request.head.sha }}" \
            | jq -r '.content' | base64 -d > spyre-rpms.lock

      - name: Check RPM cache
        id: rpm-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ runner.temp }}/rpms
          key: spyre-rpms-${{ hashFiles('spyre-rpms.lock') }}
          lookup-only: true

      - name: List Artifactory RPMs
        if: steps.rpm-cache.outputs.cache-hit != 'true'
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_BASE_URL: ${{ secrets.ARTIFACTORY_BASE_URL }}
          ARTIFACTORY_RPM_PATH: ${{ secrets.ARTIFACTORY_RPM_PATH }}
        run: |
          curl -fSL \
            -H "Authorization: Bearer ${ARTIFACTORY_TOKEN}" \
            "${ARTIFACTORY_BASE_URL}/artifactory/api/storage/${ARTIFACTORY_RPM_PATH}/x86_64?list&deep=0" \
            | jq -r '.files[].uri'

      - name: Download RPMs
        if: steps.rpm-cache.outputs.cache-hit != 'true'
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_BASE_URL: ${{ secrets.ARTIFACTORY_BASE_URL }}
          ARTIFACTORY_RPM_PATH: ${{ secrets.ARTIFACTORY_RPM_PATH }}
          RPM_NAMES_TXT: spyre-rpms.lock
          RPMS_DOWNLOAD_DIR: ${{ runner.temp }}/rpms
        run: bash .github/scripts/download_rpms.sh

      - name: Save RPM cache
        if: steps.rpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ runner.temp }}/rpms
          key: spyre-rpms-${{ hashFiles('spyre-rpms.lock') }}
