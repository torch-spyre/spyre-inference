name: populate-rpm-cache

on:
  # For fork PRs: fires almost immediately when pre-commit is queued (types: requested),
  # giving populate maximum time before test jobs check the cache. workflow_run runs in
  # base-repo context with secrets (ARTIFACTORY_TOKEN et al.) and writes to
  # refs/heads/main scope. Test jobs (pull_request) fall back from refs/pull/N/merge to
  # refs/heads/main and find the entry.
  #
  # pre-commit also triggers on push to main — we skip those here (handled by the push
  # trigger below so we don't double-populate).
  #
  # Timing note: test jobs start at the same time as pre-commit. First push with a new
  # lock file hash will see a cache miss and fail; a re-run after this workflow completes
  # will succeed.
  workflow_run:
    workflows: [pre-commit]
    types: [requested]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: >
          PR commit SHA to fetch spyre-rpms.lock from (simulates
          workflow_run.head_sha). Use to test this workflow from a branch before
          merging to main, since workflow_run only fires from the default branch.
        required: false
        type: string
        default: ""
      head_repository:
        description: >
          Fork repo containing the commit above (simulates
          workflow_run.head_repository.full_name), e.g. torch-spyre/spyre-inference.
          Leave empty to use the base repo.
        required: false
        type: string
        default: ""

concurrency:
  group: populate-rpm-cache-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  populate:
    name: Download and cache Spyre RPMs
    # Skip workflow_run events from pre-commit's push-to-main trigger — those are
    # covered by the push trigger above.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # For workflow_run events (fork PRs): overwrite the checked-out (main branch)
      # lock file with the PR's version fetched directly from the fork commit. Only
      # spyre-rpms.lock is fetched — the download script comes from the trusted base
      # repo checkout above.
      - name: Fetch PR's spyre-rpms.lock
        if: github.event_name == 'workflow_run' || inputs.head_sha != ''
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || inputs.head_sha }}
          HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name || inputs.head_repository || github.repository }}
        run: |
          git fetch "${GITHUB_SERVER_URL}/${HEAD_REPO}.git" "${HEAD_SHA}"
          git show FETCH_HEAD:spyre-rpms.lock > spyre-rpms.lock

      - name: Check RPM cache
        id: rpm-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ runner.temp }}/rpms
          key: spyre-rpms-${{ hashFiles('spyre-rpms.lock') }}
          lookup-only: true

      - name: List Artifactory RPMs
        if: steps.rpm-cache.outputs.cache-hit != 'true'
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_BASE_URL: ${{ secrets.ARTIFACTORY_BASE_URL }}
          ARTIFACTORY_RPM_PATH: ${{ secrets.ARTIFACTORY_RPM_PATH }}
        run: |
          curl -fSL \
            -H "Authorization: Bearer ${ARTIFACTORY_TOKEN}" \
            "${ARTIFACTORY_BASE_URL}/artifactory/api/storage/${ARTIFACTORY_RPM_PATH}/x86_64?list&deep=0" \
            | jq -r '.files[].uri'

      - name: Download RPMs
        if: steps.rpm-cache.outputs.cache-hit != 'true'
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_BASE_URL: ${{ secrets.ARTIFACTORY_BASE_URL }}
          ARTIFACTORY_RPM_PATH: ${{ secrets.ARTIFACTORY_RPM_PATH }}
          RPM_NAMES_TXT: spyre-rpms.lock
          RPMS_DOWNLOAD_DIR: ${{ runner.temp }}/rpms
        run: bash .github/scripts/download_rpms.sh

      - name: Save RPM cache
        if: steps.rpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ runner.temp }}/rpms
          key: spyre-rpms-${{ hashFiles('spyre-rpms.lock') }}
