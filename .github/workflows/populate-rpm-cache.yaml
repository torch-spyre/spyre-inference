name: populate-rpm-cache

on:
  # For fork PRs: the dispatch-for-pr job below cannot write cache (GitHub
  # June 2026 read-only cache restriction for untrusted triggers). Instead it
  # fires a workflow_dispatch event via the GitHub API — a brand-new trusted
  # event with full cache write access. Only fires when spyre-rpms.lock changes.
  pull_request:
    paths:
      - spyre-rpms.lock
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: >
          PR commit SHA to fetch spyre-rpms.lock from. Leave empty to use the
          checked-out lock file (push to main).
        required: false
        type: string
        default: ""
      head_repository:
        description: >
          Fork repo containing the commit above, e.g. torch-spyre/spyre-inference.
          Leave empty to use the base repo. Used together with head_sha to fetch
          the lock file from a fork PR (github.event.pull_request.head.repo.full_name).
        required: false
        type: string
        default: ""

concurrency:
  group: populate-rpm-cache-${{ inputs.head_sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # Relay job: fork pull_request events cannot write the GHA cache (GitHub's
  # June 2026 security restriction). This job fires a workflow_dispatch via the
  # GitHub API. That event is trusted and runs with full cache write access.
  dispatch-for-pr:
    name: Dispatch populate for PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run populate-rpm-cache.yaml \
            --repo "${{ github.repository }}" \
            --field "head_sha=${{ github.event.pull_request.head.sha }}" \
            --field "head_repository=${{ github.event.pull_request.head.repo.full_name }}"

  populate:
    name: Download and cache Spyre RPMs
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # For workflow_dispatch events relayed from fork PRs: overwrite the
      # checked-out (main branch) lock file with the PR's version. Only
      # spyre-rpms.lock is fetched — the download script comes from the
      # trusted base repo checkout above.
      - name: Fetch PR's spyre-rpms.lock
        if: inputs.head_sha != ''
        env:
          HEAD_SHA: ${{ inputs.head_sha }}
          HEAD_REPO: ${{ inputs.head_repository || github.repository }}
        run: |
          git fetch "${GITHUB_SERVER_URL}/${HEAD_REPO}.git" "${HEAD_SHA}"
          git show FETCH_HEAD:spyre-rpms.lock > spyre-rpms.lock

      - name: Check RPM cache
        id: rpm-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ runner.temp }}/rpms
          key: spyre-rpms-${{ hashFiles('spyre-rpms.lock') }}
          lookup-only: true

      - name: List Artifactory RPMs
        if: steps.rpm-cache.outputs.cache-hit != 'true'
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_BASE_URL: ${{ secrets.ARTIFACTORY_BASE_URL }}
          ARTIFACTORY_RPM_PATH: ${{ secrets.ARTIFACTORY_RPM_PATH }}
        run: |
          curl -fSL \
            -H "Authorization: Bearer ${ARTIFACTORY_TOKEN}" \
            "${ARTIFACTORY_BASE_URL}/artifactory/api/storage/${ARTIFACTORY_RPM_PATH}/x86_64?list&deep=0" \
            | jq -r '.files[].uri'

      - name: Download RPMs
        if: steps.rpm-cache.outputs.cache-hit != 'true'
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_BASE_URL: ${{ secrets.ARTIFACTORY_BASE_URL }}
          ARTIFACTORY_RPM_PATH: ${{ secrets.ARTIFACTORY_RPM_PATH }}
          RPM_NAMES_TXT: spyre-rpms.lock
          RPMS_DOWNLOAD_DIR: ${{ runner.temp }}/rpms
        run: bash .github/scripts/download_rpms.sh

      - name: Save RPM cache
        if: steps.rpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ runner.temp }}/rpms
          key: spyre-rpms-${{ hashFiles('spyre-rpms.lock') }}
