name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: "Set up Python 3.12"
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        python-version: "3.12"
        enable-cache: true

    - name: "Install dependencies"
      run: uv sync --frozen --no-install-package torch-spyre --no-dev -v

    - name: "Clone torch-spyre source for type stubs"
      run: |
        TORCH_SPYRE_REV=$(grep -oP '^torch-spyre = .*rev = "\K[^"]+' pyproject.toml)
        git clone --depth 1 https://github.com/torch-spyre/torch-spyre /tmp/torch-spyre
        git -C /tmp/torch-spyre fetch --depth 1 origin "$TORCH_SPYRE_REV"
        git -C /tmp/torch-spyre checkout "$TORCH_SPYRE_REV"
        mkdir /tmp/torch-spyre-stubs
        cp -r /tmp/torch-spyre/torch_spyre /tmp/torch-spyre-stubs/

    - run: echo "::add-matcher::.github/workflows/matchers/ruff.json"

    - name: "Run linting via prek"
      uses: j178/prek-action@v1
      with:
        extra_args: --all-files --hook-stage manual

    - name: "Run ty type check"
      env:
        PYTHONPATH: /tmp/torch-spyre-stubs
      run: uvx prek@v0.4.4 run ty --all-files --stage pre-commit
