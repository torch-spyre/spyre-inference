name: Preview docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "examples/**"
      - "mkdocs.yaml"
      - "docs/requirements-docs.txt"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r docs/requirements-docs.txt
      - run: mkdocs build --strict
      - uses: actions/upload-artifact@v4
        with:
          name: preview-docs
          path: site/
          retention-days: 7
