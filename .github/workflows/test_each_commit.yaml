name: 'test_each_commit'

# ---------------------------------------------------------------------------
# push / PR / merge_group entrypoint. Thin caller of the reusable
# _test_matrix.yaml (build + 6-config test matrix). The required-check gate
# (run-spyre-unit-tests) lives here because a reusable workflow's internal job
# names do not surface as top-level checks for branch protection.
#
# workflow_dispatch lives in integration-tests.yaml (the sole dispatch
# entrypoint); this workflow only fires on push/PR/merge_group, so the
# reusable workflow's github.repository/github.ref fallbacks apply and no
# inputs need to be threaded through.
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.pull_request.html_url) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  test:
    uses: ./.github/workflows/_test_matrix.yaml
    secrets: inherit
    with:
      # PR flow: skip the build/test when no source files changed.
      skip_if_no_changes: true

  # ---------------------------------------------------------------------------
  # Required check gate -- this job name must match the existing branch
  # protection rule: "tests / Run Spyre unit tests".
  # It fans in the reusable matrix result so the single required check
  # passes only when every suite passes.
  # ---------------------------------------------------------------------------
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check all suites passed
        run: |-
          if ${{ contains(needs.test.result, 'failure') || contains(needs.test.result, 'cancelled') }}; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."
