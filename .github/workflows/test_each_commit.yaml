name: 'test_each_commit'

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      torch_spyre_ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ""
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ""
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: 'build and run tests (${{ matrix.cfg }})'
    strategy:
      matrix:
        include:
          - cfg: Non-distributed spyre tests
            runs_on:
              - x86_64
              - spyre_pf_x1__pvc_1tb_x1
              - linux
              - image_spyre_inference
            flags: >-
              -m "not (distributed or upstream)"
          - cfg: Distributed spyre tests
            runs_on:
              - x86_64
              - spyre_pf_x2__pvc_1tb_x1
              - linux
              - image_spyre_inference
            flags: >-
              -m distributed
          - cfg: Upstream vLLM tests
            runs_on:
              - x86_64
              - spyre_pf_x1__pvc_1tb_x1
              - linux
              - image_spyre_inference
            flags: >-
              -m upstream
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 720
    env:
      # The CI env var is very important.
      # GitHub actions automatically sets CI=true
      # which causes the pytest inductor tests to fail with AssertionError
      # due to a mix of fallbacks and decompositions.
      # Here we set it to an empty string (or we could also unset it).
      CI: ''
      STORAGE_1_DIR: /storage-1/spyre-inference
      HF_HOME: /storage-1/spyre-inference/.cache/huggingface

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute Spyre image hash
        id: spyre-uv-cache
        uses: ./.github/actions/spyre-uv-cache

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-suffix: ${{ steps.spyre-uv-cache.outputs.image-hash }}
          # Use local runner temp to avoid ownership/permission issues on $HOME.
          cache-local-path: ${{ runner.temp }}/setup-uv-cache
          # `uv cache prune --ci` (setup-uv's default) removes pre-built wheels,
          # causing torch/vllm/torch-spyre to be rebuilt on every run despite a
          # cache hit. Keep all wheels; the cache key (uv.lock hash) handles eviction.
          prune-cache: false

      - uses: ./.github/actions/build-spyre-deps
        if: ${{ inputs.torch_spyre_ref != '' }}
        with:
          rpm_names: ${{ inputs.rpm_names }}
          rpm_location: ${{ inputs.rpm_location }}
          torch_spyre_ref: ${{ inputs.torch_spyre_ref }}
          artifactory_user: ${{ secrets.ARTIFACTORY_USER }}
          artifactory_api_key: ${{ secrets.ARTIFACTORY_API_KEY }}
          artifactory_base_url: ${{ secrets.ARTIFACTORY_BASE_URL }}
          artifactory_rpm_path: ${{ secrets.ARTIFACTORY_RPM_PATH }}

      - name: Gather runner info
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          date
          pwd
          whoami
          id
          echo "GHA_RUNNER_POD_NODE_NAME $GHA_RUNNER_POD_NODE_NAME"
          echo "PATH $PATH"
          echo "HOME $HOME"
          python3 --version
          python3 -c 'import sys; print(sys.path)'
          echo "--- env ---"
          env | sort
          echo "--- AIU env ---"
          env | sort | grep AIU || true
          echo "--- repo listing ---"
          ls -lart
          echo "---"

      - name: Dump UV cache info
        run: |
          find "$(uv cache dir)" -name '*.whl' -printf '%f\n' | sort -u

      - name: Build spyre-inference
        env:
          TORCH_SPYRE_REF: "${{ inputs.torch_spyre_ref }}"
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          if [[ -n "$TORCH_SPYRE_REF" ]]; then
            uv add torch-spyre /home/senuser/torch-spyre
            uv sync --verbose --group dev
          else
            uv sync --frozen --verbose --group dev
          fi
          # Print the resolved torch install for log visibility.
          uv pip show torch
          uv pip freeze

      - name: Run tests
        run: |
          unset _IBM_AIU_SETUP
          rm /tmp/etc/ibm/spyre/topo.json
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          echo "Running tests for config: ${{ matrix.cfg }}..."
          uv run pytest -s -vvv ${{ matrix.flags }}
          echo "tests done"

  # ---------------------------------------------------------------------------
  # Required check gate -- this job name must match the existing branch
  # protection rule: "tests / Run Spyre unit tests".
  # It fans in all matrix jobs so the single required check
  # passes only when every suite passes.
  # ---------------------------------------------------------------------------
  run-spyre-unit-tests:
    name: run spyre unit tests
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check all suites passed
        run: |-
          if ${{ contains(needs.test.result, 'failure') || contains(needs.test.result, 'cancelled') }}; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."
