# Throughput benchmarks for Spyre devices
- test_name: throughput_granite8B_tp1_in64_out64
  environment_variables:
    VLLM_CPU_KVCACHE_SPACE: 16
    DTLOG_LEVEL: error
  parameters:
    model: ibm-ai-platform/micro-g3.3-8b-instruct-1b
    tensor_parallel_size: 1
    dtype: float16
    load_format: auto
    input-len: 64
    output-len: 64
    num-prompts: 50
    max-model-len: 2048
